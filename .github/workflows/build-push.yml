name: Build and Push Multi-Arch

on:
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/telegram-bot-sgtepymebot
  DOCKER_BUILDX_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.DOCKER_BUILDX_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # Notificar a CasaOS via webhook (opcional)
  # Si CasaOS tiene un endpoint para recibir notificaciones de nuevo release,
  # se puede agregar aqui un step con curl -X POST

  # Report:
  - name: Summary
    runs-on: ubuntu-latest
    needs: build-push
    if: always()
    steps:
      - name: Build summary
        run: |
          echo "## Multi-arch build result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Platforms: ${{ env.DOCKER_BUILDX_PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ needs.build-push.result }}" >> $GITHUB_STEP_SUMMARY